app = "find-anything-demo"
primary_region = "iad"

[build]

[env]
  DATA_DIR = "/data"
  PORT     = "8765"

[http_service]
  internal_port        = 8765
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 50
    soft_limit = 25

[[mounts]]
  source      = "find_anything_data"
  destination = "/data"

[[vm]]
  memory   = "2gb"
  cpu_kind = "shared"
  cpus     = 2
